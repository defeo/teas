Sobacha Hida no Homaré:
  type: Sobacha, Roasted buckwheat infusion
  provenance: Japan, Gifu province, Hida region
  tasting: >-
    Classic sobacha. Sweet infusion, no bitterness. Copper liquor.
  rating: 3/5
  temperature: 100°
  infusion: 1min
  quantity: 26g/L
  shops:
    - http://www.jugetsudo.fr/infusion-aux-graines-de-sarrasin-hida-no-homare.html

Super White:
  type: White tea
  provenance: Darjeeling, India
  tasting: >-
    First harvest "silver needle" Darjeeling white tea. Pink-orange
    color. Subtle woody scent. Light and refreshing, no astringency,
    mild tobacco aftertaste. Good for 2-3 infusions.
  rating: 3/5
  temperature: 90°
  infusion: 3min
  quantity: 20g/L
  shops:
    - https://sanchatea.com/collections/white-tea/products/super-white-tea-silver-needles-tea
